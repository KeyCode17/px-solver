name: Release

# Two-track release flow:
#   • GitHub Release  — always created on any v*.*.* tag (incl. patches,
#                        incl. off-main tags). Source-of-truth changelog.
#   • crates.io       — gated. Only fires when:
#                          – tagged commit is on origin/main, AND
#                          – bump kind is minor / major / initial (never patch).
#
# The two jobs share a `guard` job that classifies the tag once.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force crates.io publish (workflow_dispatch only — bypass branch + bump-kind gates). Token still required."
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  CARGO_TERM_COLOR: always

jobs:
  guard:
    name: guard (tag, branch, bump kind)
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.classify.outputs.version }}
      bump_kind:  ${{ steps.classify.outputs.bump_kind }}   # major | minor | patch | initial | manual
      on_main:    ${{ steps.classify.outputs.on_main }}     # true | false
      should_publish: ${{ steps.classify.outputs.should_publish }}  # true | false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          # workflow_dispatch — manual run, no tag context.
          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            echo "version=${MANIFEST_VERSION}"      >> "$GITHUB_OUTPUT"
            echo "bump_kind=manual"                 >> "$GITHUB_OUTPUT"
            echo "on_main=unknown"                  >> "$GITHUB_OUTPUT"
            FORCE="${{ github.event.inputs.force_publish }}"
            echo "should_publish=${FORCE}"          >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — force_publish=${FORCE}"
            exit 0
          fi

          # ---- tag must match workspace.package.version ----
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "::error::release workflow expects a v*.*.* tag push (got ${GITHUB_REF})"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]]; then
            echo "::error::tag v${TAG_VERSION} does not match workspace.package.version ${MANIFEST_VERSION}"
            exit 1
          fi

          # ---- is tagged commit on main? ----
          git fetch origin main || true
          if git merge-base --is-ancestor "${GITHUB_SHA}" origin/main 2>/dev/null; then
            ON_MAIN="true"
          else
            ON_MAIN="false"
          fi

          # ---- classify bump kind vs previous tag ----
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname \
            | grep -v "^v${TAG_VERSION}$" | head -1 || true)
          if [[ -z "${PREV_TAG}" ]]; then
            BUMP_KIND="initial"
          else
            PREV_VERSION="${PREV_TAG#v}"
            IFS=. read -r CUR_MA CUR_MI CUR_PA <<< "${TAG_VERSION}"
            IFS=. read -r PRV_MA PRV_MI PRV_PA <<< "${PREV_VERSION}"
            if   [[ "${CUR_MA}" != "${PRV_MA}" ]]; then BUMP_KIND="major"
            elif [[ "${CUR_MI}" != "${PRV_MI}" ]]; then BUMP_KIND="minor"
            elif [[ "${CUR_PA}" != "${PRV_PA}" ]]; then BUMP_KIND="patch"
            else                                       BUMP_KIND="same"
            fi
            if [[ "${BUMP_KIND}" == "same" ]]; then
              echo "::error::version unchanged vs ${PREV_VERSION}"
              exit 1
            fi
            echo "prev=${PREV_VERSION}  new=${TAG_VERSION}  kind=${BUMP_KIND}"
          fi

          # ---- decide whether crates.io publish should run ----
          SHOULD_PUBLISH="false"
          if [[ "${ON_MAIN}" == "true" ]] && \
             [[ "${BUMP_KIND}" == "minor" || "${BUMP_KIND}" == "major" || "${BUMP_KIND}" == "initial" ]]; then
            SHOULD_PUBLISH="true"
          fi

          echo "version=${TAG_VERSION}"           >> "$GITHUB_OUTPUT"
          echo "bump_kind=${BUMP_KIND}"           >> "$GITHUB_OUTPUT"
          echo "on_main=${ON_MAIN}"               >> "$GITHUB_OUTPUT"
          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"

          echo "tag=v${TAG_VERSION}  on_main=${ON_MAIN}  kind=${BUMP_KIND}  publish_to_crates_io=${SHOULD_PUBLISH}"

  github-release:
    name: GitHub release (always)
    needs: guard
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build release notes from commits since previous tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname \
            | grep -v "^v${{ needs.guard.outputs.version }}$" | head -1 || true)
          {
            echo "## Release v${{ needs.guard.outputs.version }} (${{ needs.guard.outputs.bump_kind }})"
            echo
            if [[ -n "${PREV_TAG}" ]]; then
              echo "**Changes since ${PREV_TAG}:**"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
            else
              echo "Initial release."
            fi
            echo
            echo
            if [[ "${{ needs.guard.outputs.should_publish }}" == "true" ]]; then
              echo "_Published to crates.io: yes (16 \`pxsolver-*\` crates)_"
            else
              echo "_Published to crates.io: no — on_main=${{ needs.guard.outputs.on_main }}, bump_kind=${{ needs.guard.outputs.bump_kind }}._"
            fi
          } > release-notes.md
          echo "Wrote release-notes.md ($(wc -l < release-notes.md) lines)"
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "v${{ needs.guard.outputs.version }}" >/dev/null 2>&1 \
            && gh release edit   "v${{ needs.guard.outputs.version }}" --notes-file release-notes.md \
            || gh release create "v${{ needs.guard.outputs.version }}" --notes-file release-notes.md \
                 --title "v${{ needs.guard.outputs.version }}"

  pre-flight:
    name: pre-flight (check + layer-0 dry-run)
    needs: guard
    if: needs.guard.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: cargo check --workspace --all-features
      # Higher layers can't dry-run end-to-end (their deps don't exist on
      # crates.io yet); the chain self-validates during real publish below.
      - name: Dry-run layer 0
        shell: bash
        run: |
          set -euo pipefail
          for c in pxsolver-core pxsolver-types pxsolver-errors; do
            echo "::group::cargo publish --dry-run -p ${c}"
            cargo publish --dry-run -p "${c}"
            echo "::endgroup::"
          done

  crates-publish:
    name: publish to crates.io
    needs: [guard, pre-flight]
    if: needs.guard.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # Add `environment: crates-io` in repo settings if a manual approval
    # gate is desired before the token is consumed.
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2

      - name: Publish layer 0 (no internal deps)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for c in pxsolver-core pxsolver-types pxsolver-errors; do
            echo "::group::cargo publish -p ${c}"
            cargo publish -p "${c}"
            echo "::endgroup::"
          done

      - name: Wait for crates.io index (layer 0)
        run: sleep 45

      - name: Publish layer 1 (deps on layer 0 only)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for c in pxsolver-validation pxsolver-cache pxsolver-detector \
                   pxsolver-harvester pxsolver-pipeline pxsolver-native \
                   pxsolver-auth; do
            echo "::group::cargo publish -p ${c}"
            cargo publish -p "${c}"
            echo "::endgroup::"
          done

      - name: Wait for crates.io index (layer 1)
        run: sleep 45

      - name: Publish layer 2 (deps on layer 0 + 1)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for c in pxsolver-perimeterx pxsolver-cloudflare pxsolver-turnstile \
                   pxsolver-captcha pxsolver-datadome pxsolver-camoufox; do
            echo "::group::cargo publish -p ${c}"
            cargo publish -p "${c}"
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          echo "Published 16 pxsolver-* crates at v${{ needs.guard.outputs.version }} (${{ needs.guard.outputs.bump_kind }} bump)"

  skipped-notice:
    name: crates.io publish skipped
    needs: guard
    if: github.event_name == 'push' && needs.guard.outputs.should_publish != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Why
        run: |
          echo "GitHub release created for v${{ needs.guard.outputs.version }} but crates.io publish was skipped."
          echo "  on_main=${{ needs.guard.outputs.on_main }}"
          echo "  bump_kind=${{ needs.guard.outputs.bump_kind }}"
          echo "Policy: crates.io publish requires tagged commit on main + bump kind in (major|minor|initial)."
